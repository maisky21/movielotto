<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>무비 로또 | 오늘 밤, 당신을 기다리는 단 하나의 영화</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;700;900&display=swap');
    
    :root {
      --bg-gradient: linear-gradient(180deg, #fdfaf1 0%, #f7f3e9 100%);
      --card-bg: #ffffff;
      --text-main: #1a1a1a;
      --text-sub: #666666;
      --accent: #000000;
      --btn-text: #ffffff;
      --neon: #3b82f6;
      --border: #eeeeee;
      --gold: #d4af37;
    }

    .dark-mode {
      --bg-gradient: linear-gradient(180deg, #1a1a1a 0%, #121212 100%);
      --card-bg: #1e1e1e;
      --text-main: #f5f5f5;
      --text-sub: #a0a0a0;
      --accent: #ccff00;
      --btn-text: #000000;
      --neon: #ccff00;
      --border: #2a2a2a;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100dvh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      overflow: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .app-wrapper {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .hip-card {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--card-bg);
      border-radius: 36px;
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      transition: transform 0.4s ease, background-color 0.4s ease;
    }

    @media (min-width: 768px) {
      .hip-card { max-width: 850px; padding: 40px; }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-shrink: 0;
      width: 100%;
    }

    .logo {
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -0.02em;
      cursor: pointer;
      color: var(--neon);
      text-transform: uppercase;
    }

    /* Genre Filter Styles */
    .genre-filter {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 16px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .genre-filter::-webkit-scrollbar { display: none; }
    
    .genre-chip {
      padding: 6px 14px;
      border-radius: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text-sub);
    }
    .genre-chip.active {
      background: var(--accent);
      color: var(--btn-text);
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .display-area {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex-grow: 1;
      min-height: 0;
    }

    @media (min-width: 768px) {
      .display-area { flex-direction: row; align-items: stretch; gap: 40px; }
    }

    /* Card Flip Animation Styles */
    .poster-box {
      width: 160px;
      height: 240px;
      margin: 0 auto;
      flex-shrink: 0;
      position: relative;
      perspective: 1000px;
    }

    @media (min-width: 768px) {
      .poster-box { width: 300px; height: 450px; margin: 0; }
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      border-radius: 24px;
    }

    .flipped .flip-card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* Card Back (Lotto Style) */
    .card-back {
      background: linear-gradient(135deg, #1a1a1a 0%, #333333 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--gold);
      color: var(--gold);
    }
    
    .card-back::after {
      content: "LOTTO";
      font-weight: 900;
      font-size: 24px;
      letter-spacing: 4px;
      opacity: 0.3;
    }

    .card-front {
      background: #000;
      transform: rotateY(180deg);
    }

    .poster-img { width: 100%; height: 100%; object-fit: cover; }

    .slot-layer {
      position: absolute; inset: 0; background: var(--card-bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
      border-radius: 24px;
    }

    .info-container {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      min-height: 0;
      text-align: center;
      justify-content: flex-start;
    }

    @media (min-width: 768px) {
      .info-container { text-align: left; }
    }

    .badge-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
    @media (min-width: 768px) { .badge-row { justify-content: flex-start; } }

    .sticker-badge {
      font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 8px;
      background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main);
      display: flex; align-items: center; gap: 4px; text-decoration: none;
    }

    .title { font-size: 20px; font-weight: 900; margin-bottom: 4px; line-height: 1.2; }
    .desc { 
      font-size: 13px; color: var(--text-sub); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; 
      margin-top: 12px;
    }

    @media (min-width: 768px) {
      .title { font-size: 32px; }
      .desc { font-size: 15px; -webkit-line-clamp: 5; }
    }

    /* Share Bar Styles */
    .share-bar {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: auto;
      padding-top: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .share-bar.visible { opacity: 1; pointer-events: auto; }

    .share-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-sub);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 12px;
      background: var(--border);
      transition: all 0.2s;
    }
    .share-btn:hover { color: var(--text-main); transform: translateY(-2px); }

    .btn-draw {
      margin-top: 12px;
      width: 100%; 
      background: var(--accent) !important; 
      color: var(--btn-text) !important;
      padding: 18px; 
      border-radius: 20px; 
      font-weight: 900; 
      font-size: 16px;
      border: none; 
      cursor: pointer; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      transition: all 0.3s ease; 
      flex-shrink: 0;
    }
    .btn-draw:hover { filter: brightness(1.1); transform: translateY(-2px); }
    .btn-draw:active { transform: scale(0.96); }
    .btn-draw:disabled { opacity: 0.5; cursor: not-allowed; }

    .controls { display: flex; gap: 12px; }
    .icon-btn { font-size: 18px; cursor: pointer; opacity: 0.5; transition: opacity 0.2s; }
    .icon-btn:hover { opacity: 1; }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <div class="hip-card">
      <header class="header">
        <div class="logo" onclick="resetApp()">무비 로또</div>
        <div class="controls">
          <span class="icon-btn" onclick="toggleLanguage()">🌐</span>
          <span id="theme-icon" class="icon-btn" onclick="toggleTheme()">🌙</span>
        </div>
      </header>

      <div id="genre-filter" class="genre-filter">
        <!-- Genres injected via JS -->
      </div>

      <div class="display-area">
        <div id="poster-container" class="poster-box">
          <div class="flip-card-inner">
            <div class="card-face card-back">
              <div class="text-4xl mb-2">🎰</div>
            </div>
            <div class="card-face card-front">
              <img id="res-poster" class="poster-img" src="" alt="">
              <div id="slot-layer" class="slot-layer">
                <div class="w-[80px] h-[120px] overflow-hidden rounded-lg border-2 border-dashed border-gray-400 flex flex-col items-center bg-gray-50">
                  <div id="slot-track" class="transition-transform duration-100 linear">
                    <div class="h-[120px] flex items-center justify-center text-3xl opacity-20">?</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="info-container">
          <div class="flex flex-col">
            <div id="res-title" class="title">무비 로또</div>
            <p id="res-subtitle" class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">오늘 밤, 당신을 기다리는 단 하나의 영화</p>
            
            <div id="badge-row-scores" class="badge-row">
              <span class="sticker-badge">TMDB --</span>
              <span class="sticker-badge">IMDb --</span>
              <span class="sticker-badge">Rotten --</span>
            </div>

            <p id="res-desc" class="desc">추첨 버튼을 눌러 당신의 운명적인 영화를 찾아보세요.</p>
            
            <div id="badge-row-meta" class="badge-row mt-4"></div>
          </div>
        </div>
      </div>

      <div id="share-bar" class="share-bar">
        <div class="share-btn" onclick="shareResult('kakao')"><span>💬</span> 카톡 공유</div>
        <div class="share-btn" onclick="shareResult('link')"><span>🔗</span> 링크 복사</div>
      </div>

      <button id="draw-btn" class="btn-draw" onclick="startDraw()">다음 영화 뽑기</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
