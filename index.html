<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>무비 로또 (Movie Lotto) | 최종 완성판</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;700&display=swap');
    
    :root {
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-main: #1a1a1a;
      --text-sub: #9ca3af;
      --slot-bg: #fafafa;
      --border-color: #f0f0f0;
      --gold: #D4AF37;
    }

    .dark-mode {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-main: #ffffff;
      --text-sub: #888888;
      --slot-bg: #2a2a2a;
      --border-color: #333333;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 16px;
      transition: background-color 0.3s ease;
    }

    /* 반응형 카드 레이아웃 */
    .app-card {
      background: var(--card-bg);
      width: 90%; /* 모바일에서 꽉 차지 않게 여백 유지 */
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      padding: 32px 20px;
      border-radius: 32px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      position: relative;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid var(--border-color);
    }

    @media (min-width: 768px) {
      .app-card { padding: 40px 32px; width: 100%; }
    }

    .top-controls {
      position: absolute;
      top: 16px;
      right: 20px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .control-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      font-size: 10px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 8px;
      cursor: pointer;
      opacity: 0.6;
    }
    .control-btn:hover { opacity: 1; border-color: var(--gold); }

    .slot-machine {
      width: 200px;
      height: 300px;
      background: var(--slot-bg);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border-color);
    }

    .slot-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.1s linear;
    }

    .slot-item {
      height: 300px;
      width: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .placeholder-icon {
      font-size: 64px;
      color: var(--gold);
      animation: bounce 2s infinite;
      opacity: 0.2;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    #result-info {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .rating-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 800;
      transition: all 0.2s;
      border: 1px solid rgba(0,0,0,0.03);
      text-decoration: none;
    }
    
    .bg-tmdb { background: rgba(1, 180, 228, 0.1); color: #01b4e4; }
    .bg-imdb { background: rgba(245, 197, 24, 0.1); color: #f5c518; }
    .bg-rotten { background: rgba(250, 17, 21, 0.1); color: #fa1115; }

    .provider-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .btn-draw {
      padding: 14px 40px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 17px;
      color: white;
      background: var(--gold);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.25);
      border: none;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
    }
    .btn-draw:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(212, 175, 55, 0.35); }
    .btn-draw:active { transform: translateY(0); }
    .btn-draw:disabled { background: #e0e0e0; color: #aaa; box-shadow: none; }
  </style>
</head>
<body>

  <div class="app-card">
    <!-- Top Controls -->
    <div class="top-controls">
      <button id="lang-btn" class="control-btn" onclick="toggleLanguage()">EN</button>
      <button id="theme-btn" class="control-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="space-y-1">
      <h1 id="ui-title" class="text-xl font-bold tracking-tight">무비 로또</h1>
      <p id="ui-subtitle" class="text-[10px] text-gray-400 uppercase tracking-widest">Pick your destiny</p>
    </div>

    <div class="display-area w-full flex flex-col items-center">
      <!-- Slot View -->
      <div id="slot-view" class="slot-machine">
        <div id="slot-track" class="slot-content">
          <div class="slot-item">
            <div class="placeholder-icon">?</div>
          </div>
        </div>
      </div>

      <!-- Result View -->
      <div id="result-info" class="w-full">
        <div class="w-full h-48 md:h-56 rounded-2xl overflow-hidden relative shadow-md">
          <img id="res-backdrop" class="w-full h-full object-cover" src="" alt="">
          <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
          <div id="res-theater" class="absolute top-3 left-3 hidden">
            <span class="bg-red-600 text-white text-[8px] font-black px-2 py-1 rounded-md shadow-lg">🎬 THEATER</span>
          </div>
        </div>

        <h2 id="res-title" class="text-lg font-bold mt-3 mb-1 truncate">영화 제목</h2>
        
        <div class="flex flex-wrap justify-center gap-1.5 mb-3">
          <div class="rating-badge bg-tmdb">
            <span>TMDB</span>
            <span id="score-tmdb">-</span>
          </div>
          <a id="link-imdb" href="#" target="_blank" class="rating-badge bg-imdb">
            <span>IMDb</span>
            <span id="score-imdb">확인</span>
          </a>
          <a id="link-rt" href="#" target="_blank" class="rating-badge bg-rotten">
            <span>Rotten</span>
            <span id="score-rt">확인</span>
          </a>
        </div>

        <p id="res-desc" class="text-[11px] text-gray-500 leading-relaxed line-clamp-3 mb-4 px-2"></p>

        <div class="w-full border-t border-dashed border-gray-100 dark:border-gray-800 pt-4">
          <p id="ui-watch" class="text-[9px] text-gray-400 font-bold mb-3 tracking-widest uppercase">WATCH NOW ON</p>
          <div id="res-providers" class="flex justify-center gap-3 flex-wrap min-h-[32px] items-center"></div>
        </div>
      </div>
    </div>

    <button id="draw-btn" class="btn-draw" onclick="startDraw()">추첨하기</button>
  </div>

  <script>
    /**
     * @CONFIG
     * Centralized Configuration for API Keys and URLs
     */
    const CONFIG = {
      TMDB_KEY: 'f5ac0b3500a28ee145b8821abe874c7e',
      OMDB_KEY: 'd4e88f94',
      TMDB_BASE: 'https://api.themoviedb.org/3',
      OMDB_BASE: 'https://www.omdbapi.com/',
      IMG_URL: 'https://image.tmdb.org/t/p/w500',
      BD_URL: 'https://image.tmdb.org/t/p/w780',
      LANG: localStorage.getItem('movielotto-lang') || 'ko-KR',
      THEME: localStorage.getItem('movielotto-theme') || 'light'
    };

    const UI_TEXT = {
      'ko-KR': { title: '무비 로또', subtitle: '당신의 운명을 결정할 단 하나의 영화', draw: '추첨하기', spinning: '운명 확인 중...', retry: '다시 뽑기', watch: 'WATCH NOW ON', noStream: '네이버에서 정보 확인하기', check: '확인' },
      'en-US': { title: 'Movie Lotto', subtitle: 'Pick your destiny with a single movie', draw: 'Spin Now', spinning: 'Spinning...', retry: 'Spin Again', watch: 'WATCH NOW ON', noStream: 'Search on Naver', check: 'Check' }
    };

    const PROVIDER_LINKS = {
      'Netflix': 'https://www.netflix.com/kr/',
      'Disney Plus': 'https://www.disneyplus.com/ko-kr/',
      'wavve': 'https://www.wavve.com/',
      'Watcha': 'https://watcha.com/',
      'Tving': 'https://www.tving.com/',
      'Coupang Play': 'https://www.coupangplay.com/'
    };

    let movies = [];
    let isRolling = false;
    let isResultState = false;

    function applyTheme() {
      document.body.classList.toggle('dark-mode', CONFIG.THEME === 'dark');
      document.getElementById('theme-btn').textContent = CONFIG.THEME === 'dark' ? '☀️' : '🌙';
    }

    function applyLanguage() {
      const t = UI_TEXT[CONFIG.LANG];
      document.getElementById('ui-title').textContent = t.title;
      document.getElementById('ui-subtitle').textContent = t.subtitle;
      document.getElementById('draw-btn').textContent = isResultState ? t.retry : t.draw;
      document.getElementById('ui-watch').textContent = t.watch;
      document.getElementById('lang-btn').textContent = CONFIG.LANG === 'ko-KR' ? 'EN' : 'KO';
    }

    function toggleTheme() {
      CONFIG.THEME = CONFIG.THEME === 'light' ? 'dark' : 'light';
      localStorage.setItem('movielotto-theme', CONFIG.THEME);
      applyTheme();
    }

    async function toggleLanguage() {
      CONFIG.LANG = CONFIG.LANG === 'ko-KR' ? 'en-US' : 'ko-KR';
      localStorage.setItem('movielotto-lang', CONFIG.LANG);
      applyLanguage();
      await init();
      resetToSlot();
    }

    async function init() {
      try {
        const res = await fetch(`${CONFIG.TMDB_BASE}/movie/popular?api_key=${CONFIG.TMDB_KEY}&language=${CONFIG.LANG}&page=1`);
        const data = await res.json();
        movies = data.results.filter(m => m.vote_average >= 5.0);
      } catch (e) { console.error('API Error', e); }
    }

    const track = document.getElementById('slot-track');
    const drawBtn = document.getElementById('draw-btn');
    const slotView = document.getElementById('slot-view');
    const resultInfo = document.getElementById('result-info');

    function resetToSlot() {
      isResultState = false;
      resultInfo.style.display = 'none';
      slotView.style.display = 'block';
      track.style.transform = 'translateY(0)';
      track.innerHTML = '<div class="slot-item"><div class="placeholder-icon">?</div></div>';
      drawBtn.textContent = UI_TEXT[CONFIG.LANG].draw;
    }

    function renderSlotItems() {
      const shuffled = [...movies].sort(() => Math.random() - 0.5);
      track.innerHTML = shuffled.map(movie => `
        <div class="slot-item">
          <img src="${CONFIG.IMG_URL}${movie.poster_path}" class="w-[160px] h-[240px] rounded-xl object-cover shadow-md" alt="${movie.title}">
        </div>
      `).join('');
      return shuffled;
    }

    async function startDraw() {
      if (isRolling) return;
      if (isResultState) { resetToSlot(); return; }

      const currentMovies = renderSlotItems();
      isRolling = true;
      drawBtn.disabled = true;
      drawBtn.textContent = UI_TEXT[CONFIG.LANG].spinning;

      const rollCount = 12 + Math.floor(Math.random() * 8);
      let step = 0, currentPos = 0, speed = 40;

      function animate() {
        step++;
        currentPos = (currentPos + 1) % currentMovies.length;
        track.style.transform = `translateY(-${currentPos * 300}px)`;
        if (step < rollCount) {
          if (step > rollCount * 0.7) speed += 50;
          setTimeout(animate, speed);
        } else {
          finishDraw(currentMovies[currentPos]);
        }
      }
      animate();
    }

    async function finishDraw(movie) {
      const details = await getMovieDetail(movie);
      showResult(movie, details);
      isRolling = false;
      drawBtn.disabled = false;
      drawBtn.textContent = UI_TEXT[CONFIG.LANG].retry;
      isResultState = true;
    }

    async function getMovieDetail(movie) {
      try {
        const [tmdbExtRes, tmdbWatchRes, tmdbRelRes] = await Promise.all([
          fetch(`${CONFIG.TMDB_BASE}/movie/${movie.id}/external_ids?api_key=${CONFIG.TMDB_KEY}`),
          fetch(`${CONFIG.TMDB_BASE}/movie/${movie.id}/watch/providers?api_key=${CONFIG.TMDB_KEY}`),
          fetch(`${CONFIG.TMDB_BASE}/movie/${movie.id}/release_dates?api_key=${CONFIG.TMDB_KEY}`)
        ]);
        
        const extData = await tmdbExtRes.json();
        const watchData = await tmdbWatchRes.json();
        const relData = await tmdbRelRes.json();
        
        let scores = { imdb: null, rt: null };
        
        // 평점 검색 시 TMDB original_title(영어 제목) 사용 최적화
        const searchTitle = movie.original_title || movie.title;
        const omdbUrl = extData.imdb_id 
          ? `${CONFIG.OMDB_BASE}?i=${extData.imdb_id}&apikey=${CONFIG.OMDB_KEY}`
          : `${CONFIG.OMDB_BASE}?t=${encodeURIComponent(searchTitle)}&apikey=${CONFIG.OMDB_KEY}`;

        try {
          const omdbRes = await fetch(omdbUrl);
          const omdbData = await omdbRes.json();
          if (omdbData.Response === 'True') {
            scores.imdb = omdbData.imdbRating;
            const rt = omdbData.Ratings?.find(r => r.Source === 'Rotten Tomatoes');
            scores.rt = rt ? rt.Value : null;
          }
        } catch (e) {}

        return {
          imdbId: extData.imdb_id,
          providers: watchData.results?.KR?.flatrate || [],
          isTheatrical: (relData.results?.find(r => r.iso_3166_1 === 'KR')?.release_dates || []).some(d => d.type === 3),
          scores,
          tmdbLink: watchData.results?.KR?.link || ''
        };
      } catch (e) { return { providers: [], scores: { imdb: null, rt: null } }; }
    }

    function showResult(movie, details) {
      slotView.style.display = 'none';
      resultInfo.style.display = 'flex';

      // 한글 제목 (원제목) 형식으로 표시
      const displayTitle = movie.title === movie.original_title 
        ? movie.title 
        : `${movie.title} (${movie.original_title})`;
      document.getElementById('res-title').textContent = displayTitle;
      document.getElementById('score-tmdb').textContent = movie.vote_average.toFixed(1);
      
      const imdbS = document.getElementById('score-imdb'), rtS = document.getElementById('score-rt');
      imdbS.textContent = (details.scores.imdb && details.scores.imdb !== 'N/A') ? details.scores.imdb : UI_TEXT[CONFIG.LANG].check;
      rtS.textContent = details.scores.rt || UI_TEXT[CONFIG.LANG].check;
      
      document.getElementById('link-imdb').href = details.imdbId ? `https://www.imdb.com/title/${details.imdbId}` : `https://www.imdb.com/find?q=${encodeURIComponent(movie.original_title || movie.title)}`;
      document.getElementById('link-rt').href = `https://www.rottentomatoes.com/search?search=${encodeURIComponent(movie.original_title || movie.title)}`;

      document.getElementById('res-desc').textContent = movie.overview || (CONFIG.LANG === 'ko-KR' ? '줄거리가 없습니다.' : 'No summary available.');
      document.getElementById('res-backdrop').src = CONFIG.BD_URL + (movie.backdrop_path || movie.poster_path);
      
      const badge = document.getElementById('res-theater');
      if (details.isTheatrical) badge.classList.remove('hidden'); else badge.classList.add('hidden');

      const pList = document.getElementById('res-providers');
      if (details.providers.length > 0) {
        pList.innerHTML = details.providers.map(p => {
          const url = PROVIDER_LINKS[p.provider_name] || details.tmdbLink || '#';
          return `<a href="${url}" target="_blank"><img src="https://image.tmdb.org/t/p/original${p.logo_path}" class="provider-icon" title="${p.provider_name}"></a>`;
        }).join('');
      } else {
        const naverUrl = `https://search.naver.com/search.naver?query=${encodeURIComponent(movie.title + ' 영화 정보')}`;
        pList.innerHTML = `<a href="${naverUrl}" target="_blank" class="text-[10px] bg-gray-50 text-gray-400 px-4 py-2 rounded-xl font-bold flex items-center gap-1 border border-gray-100">${UI_TEXT[CONFIG.LANG].noStream}</a>`;
      }
    }

    applyTheme(); applyLanguage(); init();
    window.addEventListener('resize', () => { if (!isRolling) resetToSlot(); });
  </script>
</body>
</html>
