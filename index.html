<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>무비 로또 (Movie Lotto) | 반응형 최종판</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;700&display=swap');
    
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #f1f3f5;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 16px;
    }

    /* 중앙 카드 컨테이너 - 반응형 너비 설정 */
    .app-card {
      background: #ffffff;
      width: 100%;
      max-width: 360px; /* 기본 모바일 */
      padding: 32px 24px;
      border-radius: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.06);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      transition: max-width 0.3s ease;
    }

    /* 태블릿 및 PC에서 카드 크기 확대 */
    @media (min-width: 768px) {
      .app-card { max-width: 480px; padding: 48px 40px; }
    }
    @media (min-width: 1024px) {
      .app-card { max-width: 520px; }
    }

    .gold-accent { color: #D4AF37; }
    .bg-gold { background-color: #D4AF37; }

    /* 슬롯머신 - 반응형 크기 */
    .slot-machine {
      width: 200px;
      height: 300px;
      background: #fafafa;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      border: 1px solid #eee;
    }

    @media (min-width: 768px) {
      .slot-machine { width: 260px; height: 390px; }
    }

    .slot-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.1s linear;
    }

    /* 슬롯 아이템 높이는 JS에서 동적으로 처리하거나 미디어 쿼리로 고정 */
    .slot-item {
      height: 300px;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @media (min-width: 768px) {
      .slot-item { height: 390px; }
    }

    .placeholder-icon {
      font-size: 64px;
      color: #ddd;
      animation: bounce 2s infinite;
    }

    @media (min-width: 768px) {
      .placeholder-icon { font-size: 80px; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .slot-thumbnail {
      width: 160px;
      height: 240px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    @media (min-width: 768px) {
      .slot-thumbnail { width: 220px; height: 330px; }
    }

    /* 버튼 스타일 */
    .btn-draw {
      padding: 14px 44px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 18px;
      color: white;
      background: #D4AF37;
      transition: all 0.3s;
      box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
      border: none;
    }

    @media (min-width: 768px) {
      .btn-draw { padding: 18px 60px; font-size: 20px; }
    }

    .btn-draw:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3); }
    .btn-draw:active { transform: translateY(0); }

    /* 모달 (결과창) */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      backdrop-filter: blur(12px);
      padding: 20px;
    }

    .modal-content {
      background: white;
      border-radius: 32px;
      width: 100%;
      max-width: 360px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @media (min-width: 768px) {
      .modal-content { max-width: 440px; }
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .provider-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      object-fit: cover;
    }

    @media (min-width: 768px) {
      .provider-icon { width: 40px; height: 40px; }
    }

    .badge-theater {
      background: #ef4444;
      color: white;
      font-size: 10px;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="app-card">
    <div class="space-y-1">
      <h1 class="text-2xl md:text-3xl font-bold tracking-tight">무비 로또</h1>
      <p class="text-xs md:text-sm text-gray-400">당신의 운명을 결정할 단 하나의 영화</p>
    </div>

    <div class="slot-machine">
      <div id="slot-track" class="slot-content">
        <div class="slot-item">
          <div class="placeholder-icon">?</div>
        </div>
      </div>
    </div>

    <button id="draw-btn" class="btn-draw cursor-pointer">추첨하기</button>
  </div>

  <!-- Result Modal -->
  <div id="modal" class="modal-overlay">
    <div class="modal-content">
      <!-- Top Image Section -->
      <div class="w-full h-48 md:h-64 overflow-hidden relative">
        <img id="result-backdrop" class="w-full h-full object-cover opacity-90" src="" alt="">
        <div class="absolute inset-0 bg-gradient-to-t from-white via-transparent to-transparent"></div>
        <div id="theater-badge" class="absolute top-4 left-4 hidden">
          <span class="badge-theater">🎬 현재 극장 상영 중!</span>
        </div>
      </div>

      <!-- Info Section -->
      <div class="p-6 md:p-8 pt-0 -mt-10 relative z-10 text-center">
        <h2 id="result-title" class="text-xl md:text-2xl font-bold mb-2 truncate">영화 제목</h2>
        <div class="flex items-center justify-center gap-2 mb-4 text-sm md:text-base">
          <span class="text-gold font-bold">★ <span id="result-rating">0.0</span></span>
          <span class="text-gray-300">|</span>
          <span id="result-date" class="text-gray-400 font-medium">2024</span>
        </div>
        
        <p id="result-desc" class="text-xs md:text-sm text-gray-500 leading-relaxed line-clamp-4 mb-6 px-2">
          영화 줄거리가 여기에 표시됩니다.
        </p>

        <!-- Providers (OTT) Section -->
        <div class="mb-8">
          <p class="text-[10px] md:text-[11px] text-gray-400 font-bold mb-3 tracking-widest">WATCH NOW ON</p>
          <div id="providers-list" class="flex justify-center gap-3 flex-wrap min-h-[32px]">
            <span class="text-xs text-gray-300 italic">No stream info available</span>
          </div>
        </div>

        <button onclick="closeModal()" class="w-full py-4 bg-gray-900 text-white rounded-2xl text-sm md:text-base font-bold active:scale-95 transition">
          다시 뽑기
        </button>
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      API_KEY: 'f5ac0b3500a28ee145b8821abe874c7e',
      BASE_URL: 'https://api.themoviedb.org/3',
      IMG_URL: 'https://image.tmdb.org/t/p/w500',
      BD_URL: 'https://image.tmdb.org/t/p/w1280'
    };

    let movies = [];
    let isRolling = false;
    const track = document.getElementById('slot-track');
    const drawBtn = document.getElementById('draw-btn');
    const modal = document.getElementById('modal');

    // 화면 크기에 따른 슬롯 높이 계산
    function getSlotHeight() {
      return window.innerWidth >= 768 ? 390 : 300;
    }

    async function init() {
      try {
        const res = await fetch(`${CONFIG.BASE_URL}/movie/popular?api_key=${CONFIG.API_KEY}&language=ko-KR&page=1`);
        const data = await res.json();
        movies = data.results;
      } catch (e) { console.error('API Error', e); }
    }

    async function getMovieDetail(movieId) {
      try {
        const [providersRes, releasesRes] = await Promise.all([
          fetch(`${CONFIG.BASE_URL}/movie/${movieId}/watch/providers?api_key=${CONFIG.API_KEY}`),
          fetch(`${CONFIG.BASE_URL}/movie/${movieId}/release_dates?api_key=${CONFIG.API_KEY}`)
        ]);
        const providersData = await providersRes.json();
        const releasesData = await releasesRes.json();
        const krProviders = providersData.results?.KR?.flatrate || [];
        const krReleases = releasesData.results?.find(r => r.iso_3166_1 === 'KR')?.release_dates || [];
        const isTheatrical = krReleases.some(d => d.type === 3);
        return { providers: krProviders, isTheatrical };
      } catch (e) {
        return { providers: [], isTheatrical: false };
      }
    }

    function renderSlotItems() {
      const shuffled = [...movies].sort(() => Math.random() - 0.5);
      track.innerHTML = shuffled.map(movie => `
        <div class="slot-item">
          <img src="${CONFIG.IMG_URL}${movie.poster_path}" class="slot-thumbnail" alt="${movie.title}">
        </div>
      `).join('');
      return shuffled;
    }

    async function startDraw() {
      if (isRolling || movies.length === 0) return;
      
      const currentMovies = renderSlotItems();
      const slotHeight = getSlotHeight();
      isRolling = true;
      drawBtn.disabled = true;

      const rollCount = 20 + Math.floor(Math.random() * 20);
      let step = 0;
      let currentPos = 0;
      let speed = 40;

      function animate() {
        step++;
        currentPos = (currentPos + 1) % currentMovies.length;
        track.style.transform = `translateY(-${currentPos * slotHeight}px)`;

        if (step < rollCount) {
          if (step > rollCount * 0.7) speed += 25;
          setTimeout(animate, speed);
        } else {
          finishDraw(currentMovies[currentPos]);
        }
      }
      animate();
    }

    async function finishDraw(movie) {
      const details = await getMovieDetail(movie.id);
      showResult(movie, details);
      isRolling = false;
      drawBtn.disabled = false;
    }

    function showResult(movie, details) {
      document.getElementById('result-title').textContent = movie.title;
      document.getElementById('result-rating').textContent = movie.vote_average.toFixed(1);
      document.getElementById('result-date').textContent = (movie.release_date || '').split('-')[0];
      document.getElementById('result-desc').textContent = movie.overview || '상세 줄거리 정보가 제공되지 않습니다.';
      document.getElementById('result-backdrop').src = CONFIG.BD_URL + (movie.backdrop_path || movie.poster_path);
      
      const badge = document.getElementById('theater-badge');
      if (details.isTheatrical) badge.classList.remove('hidden');
      else badge.classList.add('hidden');

      const providersList = document.getElementById('providers-list');
      if (details.providers.length > 0) {
        providersList.innerHTML = details.providers.map(p => `
          <img src="https://image.tmdb.org/t/p/original${p.logo_path}" class="provider-icon" title="${p.provider_name}" alt="${p.provider_name}">
        `).join('');
      } else {
        providersList.innerHTML = '<span class="text-xs text-gray-300 italic">No stream info available</span>';
      }

      modal.style.display = 'flex';
    }

    function closeModal() {
      modal.style.display = 'none';
      track.style.transform = 'translateY(0)';
      track.innerHTML = '<div class="slot-item"><div class="placeholder-icon">?</div></div>';
    }

    drawBtn.addEventListener('click', startDraw);
    init();

    // 창 크기 조절 시 리셋 (애니메이션 좌표 정합성 유지)
    window.addEventListener('resize', () => {
      if (!isRolling) closeModal();
    });
  </script>
</body>
</html>
