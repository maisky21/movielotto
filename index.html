<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>시네 로또 | Cine Lotto - AI 영화 추천 서비스</title>
    <meta name="description" content="시네 로또(Cine Lotto) - AI 기반 평점 7.0 이상의 명작 영화 추천 서비스. 당신의 운명을 결정할 단 하나의 영화를 만나보세요.">
    <link rel="canonical" href="https://cinelotto.com/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="시네 로또 | Cine Lotto">
    <meta property="og:description" content="AI 기반 평점 7.0 이상의 명작 영화 추천 서비스">
    <meta property="og:url" content="https://cinelotto.com/">
    <link rel="stylesheet" href="style.css?v=1.1">
    <script src="https://www.youtube.com/iframe_api"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7106063268781346" crossorigin="anonymous"></script>
</head>
<body class="dark-mode">
    <div class="app-container">
        <header class="header">
            <h1 class="logo" onclick="resetApp()">CINE LOTTO</h1>
            <div class="controls">
                <button id="lang-toggle" class="icon-btn" onclick="toggleLanguage()">KO</button>
                <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()">☀️</button>
            </div>
        </header>

        <nav id="genre-container" class="genre-nav">
            <!-- Genre chips will be injected here -->
        </nav>

        <main class="main-card">
            <!-- Cinematic Background Layer -->
            <div class="film-strip-bg"></div>

            <!-- Hero / Slot View -->
            <div id="slot-view" class="slot-container">
                <div class="slot-window">
                    <div id="slot-track" class="slot-track">
                        <div class="slot-item placeholder">
                            <span class="ticket-icon">🎟️</span>
                        </div>
                    </div>
                </div>
                <div class="hero-text-area">
                    <p id="hero-msg" class="mystery-phrase animate-fade-up">당신의 운명을 결정할 단 하나의 영화</p>
                    <p id="trust-msg" class="trust-badge animate-fade-up">평점 7.0 이상의 명작만 엄선</p>
                </div>
            </div>

            <!-- Result View (Instagram Feed Style) -->
            <div id="result-view" class="result-container" style="display: none;">
                <div id="poster-area" class="poster-display" onclick="playTrailer()">
                    <img id="res-poster" src="" alt="Movie Poster">
                    <div id="trailer-container" class="trailer-container"></div>
                    <div id="play-overlay" class="play-overlay">
                        <span class="play-icon">▶</span>
                    </div>
                </div>
                
                <div class="movie-info-box">
                    <div class="rating-row">
                        <span id="res-rating-tmdb" class="rating-badge">TMDB --</span>
                        <span id="res-rating-imdb" class="rating-badge">IMDb --</span>
                        <span id="res-rating-rt" class="rating-badge">Rotten --</span>
                    </div>
                    
                    <h2 id="res-title" class="movie-title">영화 제목</h2>
                    
                    <div class="credits-info">
                        <span id="res-director" class="credit-text">감독: --</span>
                        <span id="credit-divider" style="margin: 0 6px; opacity: 0.3;">|</span>
                        <span id="res-cast" class="credit-text">출연: --</span>
                    </div>

                    <p id="res-overview" class="movie-overview">영화 설명이 여기에 표시됩니다.</p>
                    
                    <div class="ott-section">
                        <div id="ott-list" class="ott-list">
                            <!-- OTT icons injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <button id="draw-btn" class="draw-btn" onclick="handleDrawClick()">다음 영화 뽑기</button>
            <div class="legal-footer">
                <div class="legal-links">
                    <a href="about.html" target="_blank" id="link-about">서비스 소개</a>
                    <a href="contact.html" target="_blank" id="link-contact">문의하기</a>
                    <a href="privacy.html" target="_blank" id="link-privacy">개인정보처리방침</a>
                    <a href="terms.html" target="_blank" id="link-terms">이용약관</a>
                </div>
                <p class="copyright">© 2026 Cine Lotto / VibecodingJ. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="main.js?v=1.1"></script>
</body>
</html>
