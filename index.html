<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>무비 로또 (Movie Lotto) | 최종판</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;700&display=swap');
    
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #f1f3f5;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 16px;
      overflow: hidden;
    }

    .app-card {
      background: #ffffff;
      width: 100%;
      max-width: 360px;
      padding: 24px 20px;
      border-radius: 28px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.06);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      position: relative;
    }

    .gold-accent { color: #D4AF37; }
    .bg-gold { background-color: #D4AF37; }

    /* 슬롯머신 */
    .slot-machine {
      width: 180px;
      height: 270px;
      background: #fafafa;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      border: 1px solid #eee;
    }

    .slot-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.1s linear;
    }

    .slot-item {
      height: 270px;
      width: 180px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .placeholder-icon {
      font-size: 56px;
      color: #ddd;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .slot-thumbnail {
      width: 150px;
      height: 225px;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 6px 12px rgba(0,0,0,0.08);
    }

    .btn-draw {
      padding: 12px 36px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 16px;
      color: white;
      background: #D4AF37;
      transition: all 0.3s;
      box-shadow: 0 6px 15px rgba(212, 175, 55, 0.25);
      border: none;
    }

    /* 모달 (결과창) */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      backdrop-filter: blur(10px);
      padding: 16px;
    }

    .modal-content {
      background: white;
      border-radius: 24px;
      width: 100%;
      max-width: 320px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .provider-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      object-fit: cover;
    }

    .badge-theater {
      background: #ef4444;
      color: white;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="app-card">
    <div class="space-y-0.5">
      <h1 class="text-lg font-bold tracking-tight">무비 로또</h1>
      <p class="text-[10px] text-gray-400">당신의 운명을 결정할 단 하나의 영화</p>
    </div>

    <div class="slot-machine">
      <div id="slot-track" class="slot-content">
        <div class="slot-item">
          <div class="placeholder-icon">?</div>
        </div>
      </div>
    </div>

    <button id="draw-btn" class="btn-draw cursor-pointer active:scale-95">추첨하기</button>
  </div>

  <!-- Result Modal -->
  <div id="modal" class="modal-overlay">
    <div class="modal-content">
      <!-- Top Image Section -->
      <div class="w-full h-44 overflow-hidden relative">
        <img id="result-backdrop" class="w-full h-full object-cover opacity-80" src="" alt="">
        <div class="absolute inset-0 bg-gradient-to-t from-white via-transparent to-transparent"></div>
        <div id="theater-badge" class="absolute top-3 left-3 hidden">
          <span class="badge-theater">🎬 현재 극장 상영 중!</span>
        </div>
      </div>

      <!-- Info Section -->
      <div class="p-5 pt-0 -mt-8 relative z-10 text-center">
        <h2 id="result-title" class="text-lg font-bold mb-1 truncate">영화 제목</h2>
        <div class="flex items-center justify-center gap-1.5 mb-3 text-xs">
          <span class="text-gold font-bold">★ <span id="result-rating">0.0</span></span>
          <span class="text-gray-300">|</span>
          <span id="result-date" class="text-gray-400 font-medium">2024</span>
        </div>
        
        <p id="result-desc" class="text-[11px] text-gray-500 leading-relaxed line-clamp-3 mb-4 px-1">
          영화 줄거리가 여기에 표시됩니다.
        </p>

        <!-- Providers (OTT) Section -->
        <div class="mb-6">
          <p class="text-[9px] text-gray-400 font-bold mb-2 tracking-tighter">WATCH NOW ON</p>
          <div id="providers-list" class="flex justify-center gap-2 flex-wrap min-h-[28px]">
            <!-- OTT icons injected here -->
            <span class="text-[10px] text-gray-300 italic">No stream info available</span>
          </div>
        </div>

        <button onclick="closeModal()" class="w-full py-3 bg-gray-900 text-white rounded-xl text-xs font-bold active:scale-95 transition">
          다시 뽑기
        </button>
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      API_KEY: 'f5ac0b3500a28ee145b8821abe874c7e',
      BASE_URL: 'https://api.themoviedb.org/3',
      IMG_URL: 'https://image.tmdb.org/t/p/w500', // 포스터
      BD_URL: 'https://image.tmdb.org/t/p/w780'  // 백드롭
    };

    let movies = [];
    let isRolling = false;
    const track = document.getElementById('slot-track');
    const drawBtn = document.getElementById('draw-btn');
    const modal = document.getElementById('modal');

    async function init() {
      try {
        const res = await fetch(`${CONFIG.BASE_URL}/movie/popular?api_key=${CONFIG.API_KEY}&language=ko-KR&page=1`);
        const data = await res.json();
        movies = data.results;
      } catch (e) { console.error('API Error', e); }
    }

    async function getMovieDetail(movieId) {
      try {
        const [providersRes, releasesRes] = await Promise.all([
          fetch(`${CONFIG.BASE_URL}/movie/${movieId}/watch/providers?api_key=${CONFIG.API_KEY}`),
          fetch(`${CONFIG.BASE_URL}/movie/${movieId}/release_dates?api_key=${CONFIG.API_KEY}`)
        ]);
        
        const providersData = await providersRes.json();
        const releasesData = await releasesRes.json();
        
        // OTT 정보 (KR 기준)
        const krProviders = providersData.results?.KR?.flatrate || [];
        
        // 극장 상영 중인지 확인 (Type 3: Theatrical)
        const krReleases = releasesData.results?.find(r => r.iso_3166_1 === 'KR')?.release_dates || [];
        const isTheatrical = krReleases.some(d => d.type === 3);

        return { providers: krProviders, isTheatrical };
      } catch (e) {
        console.error('Detail Error', e);
        return { providers: [], isTheatrical: false };
      }
    }

    function renderSlotItems() {
      const shuffled = [...movies].sort(() => Math.random() - 0.5);
      track.innerHTML = shuffled.map(movie => `
        <div class="slot-item">
          <img src="${CONFIG.IMG_URL}${movie.poster_path}" class="slot-thumbnail" alt="${movie.title}">
        </div>
      `).join('');
      return shuffled;
    }

    async function startDraw() {
      if (isRolling || movies.length === 0) return;
      
      const currentMovies = renderSlotItems();
      isRolling = true;
      drawBtn.disabled = true;

      const rollCount = 15 + Math.floor(Math.random() * 15);
      let step = 0;
      let currentPos = 0;
      let speed = 40;

      function animate() {
        step++;
        currentPos = (currentPos + 1) % currentMovies.length;
        track.style.transform = `translateY(-${currentPos * 270}px)`;

        if (step < rollCount) {
          if (step > rollCount * 0.7) speed += 25;
          setTimeout(animate, speed);
        } else {
          finishDraw(currentMovies[currentPos]);
        }
      }
      animate();
    }

    async function finishDraw(movie) {
      const details = await getMovieDetail(movie.id);
      showResult(movie, details);
      isRolling = false;
      drawBtn.disabled = false;
    }

    function showResult(movie, details) {
      document.getElementById('result-title').textContent = movie.title;
      document.getElementById('result-rating').textContent = movie.vote_average.toFixed(1);
      document.getElementById('result-date').textContent = (movie.release_date || '').split('-')[0];
      document.getElementById('result-desc').textContent = movie.overview || '상세 줄거리 정보가 제공되지 않습니다.';
      document.getElementById('result-backdrop').src = CONFIG.BD_URL + (movie.backdrop_path || movie.poster_path);
      
      // Theater Badge
      const badge = document.getElementById('theater-badge');
      if (details.isTheatrical) badge.classList.remove('hidden');
      else badge.classList.add('hidden');

      // OTT Providers
      const providersList = document.getElementById('providers-list');
      if (details.providers.length > 0) {
        providersList.innerHTML = details.providers.map(p => `
          <img src="https://image.tmdb.org/t/p/original${p.logo_path}" class="provider-icon" title="${p.provider_name}" alt="${p.provider_name}">
        `).join('');
      } else {
        providersList.innerHTML = '<span class="text-[10px] text-gray-300 italic">No stream info available</span>';
      }

      modal.style.display = 'flex';
    }

    function closeModal() {
      modal.style.display = 'none';
      track.style.transform = 'translateY(0)';
      track.innerHTML = '<div class="slot-item"><div class="placeholder-icon">?</div></div>';
    }

    drawBtn.addEventListener('click', startDraw);
    init();
  </script>
</body>
</html>
