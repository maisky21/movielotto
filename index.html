<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Lotto | Instagram Edition</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;700&display=swap');
    
    :root {
      --bg-color: #fafafa;
      --card-bg: #ffffff;
      --text-main: #262626;
      --text-sub: #8e8e8e;
      --border-color: #dbdbdb;
      --accent: #ed4956; /* 인스타 하트 색상 */
    }

    .dark-mode {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-main: #f5f5f5;
      --text-sub: #a8a8a8;
      --border-color: #363636;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      transition: background-color 0.3s ease;
    }

    /* 인스타그램 피드 스타일 카드 */
    .insta-card {
      background: var(--card-bg);
      width: 100%;
      max-width: 450px;
      margin: auto;
      border: 1px solid var(--border-color);
      border-radius: 0;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: all 0.3s ease;
    }

    @media (min-width: 640px) {
      .insta-card { border-radius: 12px; margin: 20px auto; }
    }

    /* 상단 헤더 */
    .card-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      padding: 2px;
      margin-right: 10px;
    }
    .avatar-inner {
      width: 100%; height: 100%; border-radius: 50%; background: white;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }

    /* 미디어 영역 (포스터) */
    .media-container {
      width: 100%;
      aspect-ratio: 4 / 5;
      background: #efefef;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .media-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.5s ease;
    }

    /* 액션 버튼 */
    .actions {
      display: flex;
      padding: 12px 16px;
      gap: 16px;
    }

    .icon-btn { cursor: pointer; transition: transform 0.1s ease; }
    .icon-btn:active { transform: scale(1.2); }

    /* 평점 배지 */
    .rating-badges {
      display: flex;
      gap: 6px;
      padding: 0 16px 8px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
    }

    /* 텍스트 영역 */
    .content-area {
      padding: 0 16px 16px;
      text-align: left;
    }

    .movie-title { font-weight: 700; margin-bottom: 4px; }
    .movie-overview { font-size: 13px; color: var(--text-sub); line-height: 1.4; }

    /* 슬롯 애니메이션 오버레이 */
    .slot-overlay {
      position: absolute;
      inset: 0;
      background: var(--card-bg);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .slot-window {
      width: 180px;
      height: 270px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    .slot-track { transition: transform 0.1s linear; }

    /* 메인 버튼 */
    .next-btn {
      margin: 16px;
      background: #0095f6;
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }
    .next-btn:hover { background: #1877f2; }
    .next-btn:disabled { background: #b2dffc; cursor: not-allowed; }

    .top-controls {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 10px;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div class="top-controls">
    <button onclick="toggleLanguage()" class="text-[10px] font-bold border border-gray-300 rounded px-2 py-1">EN/KO</button>
    <button onclick="toggleTheme()" class="text-[10px] font-bold border border-gray-300 rounded px-2 py-1">🌙/☀️</button>
  </div>

  <div class="insta-card">
    <!-- Header -->
    <div class="card-header">
      <div class="avatar"><div class="avatar-inner">🎬</div></div>
      <div class="flex flex-col text-left">
        <span class="text-sm font-bold">movie_lotto</span>
        <span id="ui-header-sub" class="text-[10px] text-gray-400">오늘의 추천 영화</span>
      </div>
    </div>

    <!-- Media (Poster & Slot) -->
    <div class="media-container">
      <div id="slot-overlay" class="slot-overlay">
        <div class="slot-window">
          <div id="slot-track" class="slot-track flex flex-col">
            <div class="h-[270px] w-[180px] flex items-center justify-center text-4xl">?</div>
          </div>
        </div>
        <p id="ui-status" class="text-xs font-bold text-gray-400">운명 확인 중...</p>
      </div>
      <img id="res-poster" class="media-poster opacity-0" src="" alt="">
    </div>

    <!-- Actions -->
    <div class="actions">
      <div id="heart-btn" class="icon-btn text-2xl" onclick="toggleHeart()">🤍</div>
      <div class="icon-btn text-2xl">💬</div>
      <div class="icon-btn text-2xl">🚀</div>
    </div>

    <!-- Ratings -->
    <div id="rating-badges" class="rating-badges">
      <span class="badge">TMDB --</span>
      <span class="badge">IMDb --</span>
      <span class="badge">Rotten --</span>
    </div>

    <!-- Content -->
    <div class="content-area">
      <div id="res-title" class="movie-title"></div>
      <div id="res-desc" class="movie-overview line-clamp-3"></div>
      <div id="res-providers" class="flex gap-2 mt-4 flex-wrap"></div>
    </div>

    <!-- Footer Action -->
    <button id="draw-btn" class="next-btn" onclick="startDraw()">다음 영화 뽑기</button>
  </div>

  <script>
    const CONFIG = {
      TMDB_KEY: 'f5ac0b3500a28ee145b8821abe874c7e',
      OMDB_KEY: 'd4e88f94',
      TMDB_BASE: 'https://api.themoviedb.org/3',
      OMDB_BASE: 'https://www.omdbapi.com/',
      IMG_URL: 'https://image.tmdb.org/t/p/w500',
      LANG: localStorage.getItem('movielotto-lang') || 'ko-KR',
      THEME: localStorage.getItem('movielotto-theme') || 'light'
    };

    let allMovies = [];
    let viewedIds = new Set();
    let isRolling = false;

    // 초기화
    async function init() {
      applyTheme();
      await fetchHugeData();
      startDraw();
    }

    // 5페이지까지 데이터 수집 (약 100개)
    async function fetchHugeData() {
      try {
        const pages = [1, 2, 3, 4, 5];
        const requests = pages.map(p => 
          fetch(`${CONFIG.TMDB_BASE}/movie/popular?api_key=${CONFIG.TMDB_KEY}&language=${CONFIG.LANG}&page=${p}`)
          .then(r => r.json())
        );
        const results = await Promise.all(requests);
        allMovies = results.flatMap(r => r.results).filter(m => m.vote_count >= 500 && m.vote_average >= 5.0);
        // 무작위 셔플
        allMovies.sort(() => Math.random() - 0.5);
      } catch (e) { console.error('Data Load Error', e); }
    }

    async function startDraw() {
      if (isRolling) return;
      
      // 중복 제거 및 리스트 관리
      const pool = allMovies.filter(m => !viewedIds.has(m.id));
      if (pool.length === 0) {
        viewedIds.clear(); // 모두 봤으면 초기화
        return startDraw();
      }

      const drawBtn = document.getElementById('draw-btn');
      const slotOverlay = document.getElementById('slot-overlay');
      const resPoster = document.getElementById('res-poster');
      const track = document.getElementById('slot-track');
      
      isRolling = true;
      drawBtn.disabled = true;
      slotOverlay.style.display = 'flex';
      resPoster.classList.add('opacity-0');
      document.getElementById('heart-btn').textContent = '🤍';

      // 룰렛 시각화용 샘플
      const samples = [];
      for(let i=0; i<15; i++) samples.push(pool[Math.floor(Math.random() * pool.length)]);
      
      track.innerHTML = samples.map(m => `
        <div class="h-[270px] w-[180px] flex-shrink-0">
          <img src="${CONFIG.IMG_URL}${m.poster_path}" class="w-full h-full object-cover rounded-lg">
        </div>
      `).join('');

      let step = 0;
      let currentPos = 0;
      const totalSteps = 15 + Math.floor(Math.random() * 10);
      
      const animate = () => {
        step++;
        currentPos = (currentPos + 1) % samples.length;
        track.style.transform = `translateY(-${currentPos * 270}px)`;
        
        if (step < totalSteps) {
          setTimeout(animate, 50 + (step * 10));
        } else {
          const winner = samples[currentPos];
          viewedIds.add(winner.id);
          finishDraw(winner);
        }
      };
      animate();
    }

    async function finishDraw(movie) {
      const details = await getExtendedInfo(movie);
      
      // 결과 바인딩
      document.getElementById('res-poster').src = CONFIG.IMG_URL + movie.poster_path;
      document.getElementById('res-title').textContent = movie.title === movie.original_title ? movie.title : `${movie.title} (${movie.original_title})`;
      document.getElementById('res-desc').textContent = movie.overview || '상세 정보가 없습니다.';
      
      // 평점 배지
      const badges = document.getElementById('rating-badges');
      badges.innerHTML = `
        <a href="https://www.themoviedb.org/movie/${movie.id}" target="_blank" class="badge bg-tmdb">TMDB ${movie.vote_average.toFixed(1)}</a>
        <a href="https://www.imdb.com/title/${details.imdbId}" target="_blank" class="badge bg-imdb">IMDb ${details.imdb || '--'}</a>
        <a href="https://www.rottentomatoes.com/search?search=${encodeURIComponent(movie.original_title)}" target="_blank" class="badge bg-rotten">Rotten ${details.rt || '--'}</a>
      `;

      // OTT (KR)
      const providersArea = document.getElementById('res-providers');
      providersArea.innerHTML = details.providers.map(p => `
        <a href="${PROVIDER_LINKS[p.provider_name] || '#'}" target="_blank">
          <img src="https://image.tmdb.org/t/p/original${p.logo_path}" class="provider-icon" title="${p.provider_name}">
        </a>
      `).join('');

      // 연출: 페이드 인
      setTimeout(() => {
        document.getElementById('slot-overlay').style.display = 'none';
        document.getElementById('res-poster').classList.remove('opacity-0');
        document.getElementById('draw-btn').disabled = false;
        isRolling = false;
      }, 500);
    }

    async function getExtendedInfo(movie) {
      try {
        const [extRes, watchRes] = await Promise.all([
          fetch(`${CONFIG.TMDB_BASE}/movie/${movie.id}/external_ids?api_key=${CONFIG.TMDB_KEY}`),
          fetch(`${CONFIG.TMDB_BASE}/movie/${movie.id}/watch/providers?api_key=${CONFIG.TMDB_KEY}`)
        ]);
        const ext = await extRes.json();
        const watch = await watchRes.json();
        
        let imdb = null, rt = null;
        if (ext.imdb_id) {
          const omdb = await fetch(`${CONFIG.OMDB_BASE}?i=${ext.imdb_id}&apikey=${CONFIG.OMDB_KEY}`).then(r => r.json());
          if (omdb.Response === 'True') {
            imdb = omdb.imdbRating;
            rt = omdb.Ratings?.find(r => r.Source === 'Rotten Tomatoes')?.Value;
          }
        }
        return { imdbId: ext.imdb_id, imdb, rt, providers: watch.results?.KR?.flatrate || [] };
      } catch (e) { return { providers: [], imdb: null, rt: null }; }
    }

    const PROVIDER_LINKS = { 'Netflix': 'https://www.netflix.com/kr/', 'Disney Plus': 'https://www.disneyplus.com/ko-kr/', 'Tving': 'https://www.tving.com/', 'Coupang Play': 'https://www.coupangplay.com/' };

    function toggleHeart() {
      const btn = document.getElementById('heart-btn');
      btn.textContent = btn.textContent === '🤍' ? '❤️' : '🤍';
    }

    function toggleTheme() {
      CONFIG.THEME = CONFIG.THEME === 'light' ? 'dark' : 'light';
      localStorage.setItem('movielotto-theme', CONFIG.THEME);
      applyTheme();
    }

    function applyTheme() {
      document.body.classList.toggle('dark-mode', CONFIG.THEME === 'dark');
    }

    async function toggleLanguage() {
      CONFIG.LANG = CONFIG.LANG === 'ko-KR' ? 'en-US' : 'ko-KR';
      localStorage.setItem('movielotto-lang', CONFIG.LANG);
      await init();
    }

    init();
  </script>
</body>
</html>
