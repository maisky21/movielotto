<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>무비 로또 | 오늘 밤, 당신을 기다리는 단 하나의 영화</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;700;900&display=swap');
    
    :root {
      --bg-gradient: linear-gradient(180deg, #fdfaf1 0%, #f7f3e9 100%);
      --card-bg: #ffffff;
      --text-main: #1a1a1a;
      --text-sub: #666666;
      --accent: #000000;
      --btn-text: #ffffff;
      --neon: #3b82f6;
      --border: #eeeeee;
    }

    .dark-mode {
      --bg-gradient: linear-gradient(180deg, #1a1a1a 0%, #121212 100%);
      --card-bg: #1e1e1e;
      --text-main: #f5f5f5;
      --text-sub: #a0a0a0;
      --accent: #ccff00;
      --btn-text: #000000;
      --neon: #ccff00;
      --border: #2a2a2a;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100dvh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      overflow: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .app-wrapper {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px 20px 60px; /* 하단 여백 조정 */
    }

    .hip-card {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--card-bg);
      border-radius: 36px;
      padding: 28px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      transition: transform 0.4s ease, background-color 0.4s ease;
    }

    @media (min-width: 768px) {
      .hip-card { max-width: 800px; height: auto; max-height: 85dvh; padding: 40px; }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-shrink: 0;
      width: 100%;
    }

    .logo {
      font-weight: 900;
      font-size: 16px;
      letter-spacing: -0.02em;
      cursor: pointer;
      color: var(--neon);
      text-transform: uppercase;
    }

    .display-area {
      display: flex;
      flex-direction: column;
      gap: 24px; /* 간격 확대 */
      flex-grow: 1;
      min-height: 0;
    }

    @media (min-width: 768px) {
      .display-area { flex-direction: row; align-items: stretch; gap: 48px; }
    }

    .poster-box {
      width: 45%; /* 모바일에서 조금 더 축소하여 텍스트 공간 확보 */
      height: 25dvh;
      margin: 0 auto;
      flex-shrink: 0;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    @media (min-width: 768px) {
      .poster-box { width: 320px; height: auto; margin: 0; border-radius: 28px; }
    }

    .poster-img {
      width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease;
    }

    .slot-layer {
      position: absolute; inset: 0; background: var(--card-bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
    }

    .info-container {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      min-height: 0;
      text-align: center;
      justify-content: space-between;
    }

    @media (min-width: 768px) {
      .info-container { text-align: left; justify-content: flex-start; }
    }

    .badge-row {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    }

    @media (min-width: 768px) {
      .badge-row { justify-content: flex-start; gap: 12px; }
    }

    .sticker-badge {
      font-size: 11px; /* 1.2배 상향 */
      font-weight: 900; /* 더 두껍게 */
      padding: 6px 12px;
      border-radius: 10px;
      background: var(--card-bg); border: 1.5px solid var(--border); color: var(--text-main);
      display: flex; align-items: center; gap: 4px; text-decoration: none;
    }

    .provider-container {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }

    .provider-sticker {
      width: 42px; height: 42px; /* 40px 이상으로 키움 */
      border-radius: 50%; border: 2px solid white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1); background: white;
    }
    
    .provider-name { font-size: 8px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; }

    .title { font-size: 20px; font-weight: 900; margin-bottom: 6px; line-height: 1.2; }
    .desc { 
      font-size: 14px; /* 1~2pt 상향 */
      color: var(--text-sub); 
      line-height: 1.7; /* 줄 간격 확대 */
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; 
    }

    @media (min-width: 768px) {
      .title { font-size: 34px; margin-bottom: 16px; }
      .desc { font-size: 16px; -webkit-line-clamp: 6; }
    }

    .btn-draw {
      margin-top: 32px; /* 간격 확대 */
      width: 100%; 
      background: var(--accent) !important; 
      color: var(--btn-text) !important;
      padding: 20px; 
      border-radius: 24px; 
      font-weight: 900; 
      font-size: 17px;
      border: none; 
      cursor: pointer; 
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      transition: all 0.3s ease; 
      flex-shrink: 0;
      -webkit-appearance: none;
    }
    
    .btn-draw:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
    }

    .btn-draw:active { transform: scale(0.96); }
    .btn-draw:disabled { opacity: 0.3; }

    .controls { display: flex; gap: 12px; }
    .icon-btn { font-size: 16px; cursor: pointer; opacity: 0.4; transition: opacity 0.2s; }
    .icon-btn:hover { opacity: 1; }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <div class="hip-card">
      <header class="header">
        <div class="logo" onclick="resetApp()">무비 로또</div>
        <div class="controls">
          <span class="icon-btn" onclick="toggleLanguage()">🌐</span>
          <span id="theme-icon" class="icon-btn" onclick="toggleTheme()">🌙</span>
        </div>
      </header>

      <div class="display-area">
        <div class="poster-box">
          <div id="slot-layer" class="slot-layer">
            <div class="w-[70px] h-[100px] overflow-hidden rounded-lg border border-dashed border-gray-300 flex flex-col items-center">
              <div id="slot-track" class="transition-transform duration-100 linear">
                <div class="h-[100px] flex items-center justify-center text-2xl opacity-20">?</div>
              </div>
            </div>
          </div>
          <img id="res-poster" class="poster-img opacity-0" src="" alt="">
        </div>

        <div class="info-container">
          <div class="space-y-6"> <!-- 간격 확대 -->
            <div id="res-title" class="title">무비 로또</div>
            <p id="res-subtitle" class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">오늘 밤, 당신을 기다리는 단 하나의 영화</p>
            
            <div id="badge-row-scores" class="badge-row" onclick="event.stopPropagation()">
              <span class="sticker-badge">TMDB --</span>
              <span class="sticker-badge">IMDb --</span>
              <span class="sticker-badge">Rotten --</span>
            </div>

            <p id="res-desc" class="desc">추첨 버튼을 눌러 당신의 운명적인 영화를 찾아보세요.</p>
          </div>

          <div id="badge-row-meta" class="badge-row mt-8" onclick="event.stopPropagation()"></div> <!-- 간격 확대 -->
        </div>
      </div>

      <button id="draw-btn" class="btn-draw" onclick="startDraw()">다음 영화 뽑기</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
