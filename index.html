<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>무비 로또 | 오늘 밤, 당신을 기다리는 단 하나의 영화</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode"> <!-- Default to dark mode -->
    <div class="app-container">
        <header class="header">
            <h1 class="logo" onclick="resetApp()">MOVIE LOTTO</h1>
            <div class="controls">
                <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()">☀️</button>
            </div>
        </header>

        <nav id="genre-container" class="genre-nav">
            <!-- Genre chips will be injected here -->
        </nav>

        <main class="main-card">
            <!-- Slot Machine View -->
            <div id="slot-view" class="slot-container">
                <div class="slot-window">
                    <div id="slot-track" class="slot-track">
                        <!-- Posters will be injected here -->
                        <div class="slot-item placeholder">🎰</div>
                    </div>
                </div>
            </div>

            <!-- Result View (Hidden by default) -->
            <div id="result-view" class="result-container" style="display: none;">
                <div class="poster-display">
                    <img id="res-poster" src="" alt="Movie Poster">
                </div>
                <div class="movie-info-box">
                    <div class="rating-row">
                        <span id="res-rating-tmdb" class="rating-badge">TMDB 7.5</span>
                        <span id="res-rating-imdb" class="rating-badge">IMDb 7.2</span>
                    </div>
                    <h2 id="res-title" class="movie-title">영화 제목</h2>
                    <p id="res-overview" class="movie-overview">영화 설명이 여기에 표시됩니다.</p>
                    
                    <div class="ott-section">
                        <p class="ott-label">WATCH NOW</p>
                        <div id="ott-list" class="ott-list">
                            <!-- OTT icons injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <button id="draw-btn" class="draw-btn" onclick="handleDrawClick()">다음 영화 뽑기</button>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
