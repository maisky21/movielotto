<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 영화 무비 로또</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;700&display=swap');
    
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #f8f9fa; /* 연한 회색 배경 */
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
    }

    /* 중앙 카드 컨테이너 */
    .app-card {
      background: #ffffff;
      width: 100%;
      max-width: 380px;
      padding: 32px 24px;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .gold-accent { color: #D4AF37; }
    .bg-gold { background-color: #D4AF37; }

    /* 슬롯머신 스타일 (포스터 카드) */
    .slot-machine {
      width: 200px;
      height: 300px;
      background: #fafafa;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      border: 1px solid #f0f0f0;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.03);
    }

    .slot-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.1s linear;
    }

    .slot-item {
      height: 300px;
      width: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    /* 초기 물음표 아이콘 */
    .placeholder-icon {
      font-size: 64px;
      color: #e5e7eb;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .slot-thumbnail {
      width: 160px;
      height: 240px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    /* 버튼 스타일 */
    .btn-draw {
      padding: 14px 40px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 17px;
      color: white;
      background: #D4AF37;
      transition: all 0.3s;
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
      border: none;
      cursor: pointer;
    }

    .btn-draw:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(212, 175, 55, 0.4);
    }

    .btn-draw:active {
      transform: translateY(0);
    }

    .btn-draw:disabled {
      background: #e5e7eb;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* 모달 스타일 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      backdrop-filter: blur(8px);
      padding: 20px;
    }

    .modal-content {
      background: white;
      padding: 32px 24px;
      border-radius: 28px;
      width: 100%;
      max-width: 340px;
      text-align: center;
      animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popUp {
      from { transform: translateY(20px) scale(0.9); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="app-card">
    <div class="space-y-1">
      <h1 class="text-xl font-bold tracking-tight">무비 로또</h1>
      <p class="text-xs text-gray-400">오늘 당신의 운명적인 영화는?</p>
    </div>

    <!-- Slot Machine (Center Poster) -->
    <div class="slot-machine">
      <div id="slot-track" class="slot-content">
        <div class="slot-item">
          <div class="placeholder-icon">?</div>
        </div>
      </div>
    </div>

    <button id="draw-btn" class="btn-draw">추첨하기</button>
  </div>

  <!-- Result Modal -->
  <div id="modal" class="modal-overlay">
    <div class="modal-content">
      <div class="inline-block px-3 py-1 bg-gold/10 text-gold text-[10px] font-extrabold rounded-full mb-4 tracking-widest">SELECTED MOVIE</div>
      <h2 id="result-title" class="text-xl font-bold mb-2">영화 제목</h2>
      <div class="flex items-center justify-center gap-1 mb-4">
        <span class="text-gold text-sm">★</span>
        <span id="result-rating" class="text-sm font-bold">8.5</span>
      </div>
      <p id="result-desc" class="text-xs text-gray-500 leading-relaxed mb-8 line-clamp-4 px-2">
        영화 요약이 여기에 표시됩니다.
      </p>
      <button onclick="closeModal()" class="w-full py-3 bg-gray-50 text-gray-500 rounded-2xl text-sm font-bold hover:bg-gray-100 transition">
        다시 뽑기
      </button>
    </div>
  </div>

  <script>
    const CONFIG = {
      API_KEY: 'f5ac0b3500a28ee145b8821abe874c7e',
      BASE_URL: 'https://api.themoviedb.org/3',
      IMG_URL: 'https://image.tmdb.org/t/p/w400'
    };

    let movies = [];
    let isRolling = false;
    const track = document.getElementById('slot-track');
    const drawBtn = document.getElementById('draw-btn');
    const modal = document.getElementById('modal');

    async function init() {
      try {
        const res = await fetch(`${CONFIG.BASE_URL}/movie/popular?api_key=${CONFIG.API_KEY}&language=ko-KR&page=1`);
        const data = await res.json();
        movies = data.results;
      } catch (e) {
        console.error('API Error', e);
      }
    }

    function renderSlotItems() {
      // 셔플된 리스트를 만들어 룰렛 효과 극대화
      const shuffled = [...movies].sort(() => Math.random() - 0.5);
      track.innerHTML = shuffled.map(movie => `
        <div class="slot-item">
          <img src="${CONFIG.IMG_URL}${movie.poster_path}" class="slot-thumbnail" alt="${movie.title}">
        </div>
      `).join('');
      return shuffled;
    }

    function startDraw() {
      if (isRolling || movies.length === 0) return;
      
      const currentMovies = renderSlotItems();
      isRolling = true;
      drawBtn.disabled = true;

      const itemCount = currentMovies.length;
      const rollCount = 20 + Math.floor(Math.random() * 20);
      let step = 0;
      let currentPos = 0;
      let speed = 40;

      function animate() {
        step++;
        currentPos = (currentPos + 1) % itemCount;
        track.style.transform = `translateY(-${currentPos * 300}px)`;

        if (step < rollCount) {
          if (step > rollCount * 0.7) speed += 20;
          setTimeout(animate, speed);
        } else {
          setTimeout(() => {
            showResult(currentMovies[currentPos]);
            isRolling = false;
            drawBtn.disabled = false;
          }, 400);
        }
      }
      animate();
    }

    function showResult(movie) {
      document.getElementById('result-title').textContent = movie.title;
      document.getElementById('result-rating').textContent = movie.vote_average.toFixed(1);
      document.getElementById('result-desc').textContent = movie.overview || '상세 정보가 없습니다.';
      modal.style.display = 'flex';
    }

    function closeModal() {
      modal.style.display = 'none';
      // 리셋: 물음표 상태로
      track.style.transform = 'translateY(0)';
      track.innerHTML = '<div class="slot-item"><div class="placeholder-icon">?</div></div>';
    }

    drawBtn.addEventListener('click', startDraw);
    init();
  </script>
</body>
</html>
