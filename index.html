<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Movie Lotto | New Hip & Minimal</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;700;900&display=swap');
    
    :root {
      --bg-color: #fdfaf1; /* Cream */
      --card-bg: #ffffff;
      --text-main: #1a1a1a;
      --text-sub: #666666;
      --accent: #000000;
      --neon: #3b82f6; /* Electric Blue for light mode */
      --border: #eeeeee;
    }

    .dark-mode {
      --bg-color: #121212; /* Matte Dark Grey */
      --card-bg: #1e1e1e;
      --text-main: #f5f5f5;
      --text-sub: #a0a0a0;
      --accent: #ccff00; /* Neon Lime */
      --neon: #ccff00;
      --border: #2a2a2a;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100dvh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      overflow: hidden;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    /* 힙 & 미니멀 카드 */
    .hip-card {
      width: 100%;
      max-width: 400px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      padding: 20px;
    }

    @media (min-width: 640px) {
      .hip-card { height: auto; max-height: 95dvh; }
    }

    /* 상단 로고 & 컨트롤 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .logo {
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -0.05em;
      cursor: pointer;
      color: var(--neon);
      text-transform: uppercase;
    }

    /* 메인 포스터 카드 - 강조 */
    .poster-box {
      flex-grow: 1;
      min-height: 0;
      position: relative;
      border-radius: 40px;
      overflow: hidden;
      background: var(--card-bg);
      border: 1px solid var(--border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-draw:hover ~ .display-area .poster-box,
    .btn-draw:active ~ .display-area .poster-box {
      transform: scale(1.03);
    }

    .poster-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.5s ease;
    }

    /* 슬롯 애니메이션 레이어 */
    .slot-layer {
      position: absolute;
      inset: 0;
      background: var(--card-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .slot-track { transition: transform 0.1s linear; }

    /* 배지 시스템 (스티커 스타일) */
    .badge-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
      flex-shrink: 0;
    }

    .sticker-badge {
      font-size: 10px;
      font-weight: 800;
      padding: 6px 12px;
      border-radius: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: all 0.3s ease;
    }

    .badge-neon { border-color: var(--neon); color: var(--neon); }

    .provider-sticker {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    /* 텍스트 정보 */
    .info-box {
      margin-top: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .title { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
    .desc { font-size: 13px; color: var(--text-sub); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; padding: 0 10px; }

    /* 넥스트 버튼 - 힙 스타일 */
    .btn-draw {
      margin-top: 24px;
      width: 100%;
      background: var(--accent);
      color: var(--bg-color);
      padding: 18px;
      border-radius: 24px;
      font-weight: 800;
      font-size: 16px;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    
    .btn-draw:active { transform: scale(0.96); }
    .btn-draw:disabled { opacity: 0.3; cursor: not-allowed; }

    .controls { display: flex; gap: 12px; }
    .icon-btn { font-size: 18px; cursor: pointer; opacity: 0.5; transition: opacity 0.2s; }
    .icon-btn:hover { opacity: 1; }
  </style>
</head>
<body>

  <div class="hip-card">
    <!-- Header -->
    <header class="header">
      <div class="logo" onclick="resetApp()">MOVIE LOTTO</div>
      <div class="controls">
        <span class="icon-btn" onclick="toggleLanguage()">🌐</span>
        <span id="theme-icon" class="icon-btn" onclick="toggleTheme()">🌙</span>
      </div>
    </header>

    <!-- Main Display Area -->
    <div class="display-area flex-grow flex flex-col min-height-0">
      <div class="poster-box">
        <!-- Slot Loader -->
        <div id="slot-layer" class="slot-layer">
          <div class="w-[160px] h-[240px] overflow-hidden rounded-2xl border border-dashed border-gray-300 flex flex-col items-center">
            <div id="slot-track" class="slot-track">
              <div class="h-[240px] flex items-center justify-center text-5xl opacity-20">?</div>
            </div>
          </div>
          <p id="ui-status" class="mt-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Syncing Destiny</p>
        </div>
        <!-- Final Result Image -->
        <img id="res-poster" class="poster-img opacity-0" src="" alt="">
      </div>

      <!-- Sticker Badges (OTT/Theater) -->
      <div id="badge-row-meta" class="badge-row">
        <!-- Injected OTT/Theater stickers -->
      </div>

      <!-- Score Badges -->
      <div id="badge-row-scores" class="badge-row !mt-3">
        <span class="sticker-badge">TMDB --</span>
        <span class="sticker-badge">IMDb --</span>
        <span class="sticker-badge">Rotten --</span>
      </div>

      <!-- Text Content -->
      <div class="info-box">
        <div id="res-title" class="title"></div>
        <div id="res-desc" class="desc"></div>
      </div>
    </div>

    <!-- Draw Button -->
    <button id="draw-btn" class="btn-draw" onclick="startDraw()">다음 영화 뽑기</button>
  </div>

  <script>
    const CONFIG = {
      TMDB_KEY: 'f5ac0b3500a28ee145b8821abe874c7e',
      OMDB_KEY: 'd4e88f94',
      TMDB_BASE: 'https://api.themoviedb.org/3',
      OMDB_BASE: 'https://www.omdbapi.com/',
      IMG_URL: 'https://image.tmdb.org/t/p/w500',
      LANG: localStorage.getItem('movielotto-lang') || 'ko-KR',
      THEME: localStorage.getItem('movielotto-theme') || 'dark'
    };

    const UI_TEXT = {
      'ko-KR': { status: '운명 동기화 중', draw: '다음 영화 뽑기', theater: '🎬 극장 상영 중', noInfo: '정보 없음' },
      'en-US': { status: 'Syncing Destiny', draw: 'Next Movie', theater: '🎬 In Theaters', noInfo: 'No info' }
    };

    let allMovies = [];
    let currentMovie = null;
    let viewedIds = new Set();
    let isRolling = false;

    async function init() {
      applyTheme();
      applyLanguage();
      await fetchData();
      startDraw();
    }

    async function fetchData() {
      try {
        const pages = [1, 2, 3, 4, 5];
        const res = await Promise.all(pages.map(p => 
          fetch(`${CONFIG.TMDB_BASE}/movie/popular?api_key=${CONFIG.TMDB_KEY}&language=${CONFIG.LANG}&page=${p}`).then(r => r.json())
        ));
        allMovies = res.flatMap(r => r.results).filter(m => m.vote_count >= 500 && m.vote_average >= 5.0);
        allMovies.sort(() => Math.random() - 0.5);
      } catch (e) { console.error(e); }
    }

    async function startDraw() {
      if (isRolling || allMovies.length === 0) return;
      const pool = allMovies.filter(m => !viewedIds.has(m.id));
      if (pool.length === 0) { viewedIds.clear(); return startDraw(); }

      isRolling = true;
      document.getElementById('draw-btn').disabled = true;
      document.getElementById('slot-layer').style.display = 'flex';
      document.getElementById('res-poster').classList.add('opacity-0');

      const samples = [];
      for(let i=0; i<10; i++) samples.push(pool[Math.floor(Math.random() * pool.length)]);
      
      const track = document.getElementById('slot-track');
      track.style.transform = 'translateY(0)';
      track.innerHTML = samples.map(m => `<div class="h-[240px] w-[160px] flex-shrink-0"><img src="${CONFIG.IMG_URL}${m.poster_path}" class="w-full h-full object-cover rounded-xl"></div>`).join('');

      let step = 0;
      const totalSteps = 10 + Math.floor(Math.random() * 5);
      const animate = () => {
        step++;
        track.style.transform = `translateY(-${(step % samples.length) * 240}px)`;
        if (step < totalSteps) {
          setTimeout(animate, 50 + (step * 20));
        } else {
          currentMovie = samples[step % samples.length];
          viewedIds.add(currentMovie.id);
          finishDraw();
        }
      };
      animate();
    }

    async function finishDraw() {
      const details = await getExtraInfo(currentMovie);
      renderUI(currentMovie, details);
      
      setTimeout(() => {
        document.getElementById('slot-layer').style.display = 'none';
        document.getElementById('res-poster').classList.remove('opacity-0');
        document.getElementById('draw-btn').disabled = false;
        isRolling = false;
      }, 400);
    }

    function renderUI(movie, details) {
      document.getElementById('res-poster').src = CONFIG.IMG_URL + movie.poster_path;
      document.getElementById('res-title').textContent = movie.title + (movie.title !== movie.original_title ? ` (${movie.original_title})` : '');
      document.getElementById('res-desc').textContent = movie.overview || UI_TEXT[CONFIG.LANG].noInfo;

      // Meta Badges (OTT/Theater)
      const metaRow = document.getElementById('badge-row-meta');
      metaRow.innerHTML = '';
      if (details.isTheatrical) {
        metaRow.innerHTML += `<span class="sticker-badge badge-neon">${UI_TEXT[CONFIG.LANG].theater}</span>`;
      }
      details.providers.forEach(p => {
        metaRow.innerHTML += `
          <a href="${PROVIDER_LINKS[p.provider_name] || '#'}" target="_blank">
            <img src="https://image.tmdb.org/t/p/original${p.logo_path}" class="provider-sticker" title="${p.provider_name}">
          </a>`;
      });

      // Score Badges
      document.getElementById('badge-row-scores').innerHTML = `
        <a href="https://www.themoviedb.org/movie/${movie.id}" target="_blank" class="sticker-badge">TMDB ${movie.vote_average.toFixed(1)}</a>
        <a href="https://www.imdb.com/title/${details.imdbId}" target="_blank" class="sticker-badge">IMDb ${details.imdb || '--'}</a>
        <a href="https://www.rottentomatoes.com/search?search=${encodeURIComponent(movie.original_title)}" target="_blank" class="sticker-badge">Rotten ${details.rt || '--'}</a>
      `;
    }

    async function getExtraInfo(movie) {
      try {
        const [ext, watch, rel] = await Promise.all([
          fetch(`${CONFIG.TMDB_BASE}/movie/${movie.id}/external_ids?api_key=${CONFIG.TMDB_KEY}`).then(r => r.json()),
          fetch(`${CONFIG.TMDB_BASE}/movie/${movie.id}/watch/providers?api_key=${CONFIG.TMDB_KEY}`).then(r => r.json()),
          fetch(`${CONFIG.TMDB_BASE}/movie/${movie.id}/release_dates?api_key=${CONFIG.TMDB_KEY}`).then(r => r.json())
        ]);
        let imdb = null, rt = null;
        if (ext.imdb_id) {
          const omdb = await fetch(`${CONFIG.OMDB_BASE}?i=${ext.imdb_id}&apikey=${CONFIG.OMDB_KEY}`).then(r => r.json());
          if (omdb.Response === 'True') {
            imdb = omdb.imdbRating;
            rt = omdb.Ratings?.find(r => r.Source === 'Rotten Tomatoes')?.Value;
          }
        }
        const isTheatrical = (rel.results?.find(r => r.iso_3166_1 === 'KR')?.release_dates || []).some(d => d.type === 3);
        return { imdbId: ext.imdb_id, imdb, rt, isTheatrical, providers: watch.results?.KR?.flatrate || [] };
      } catch (e) { return { providers: [], isTheatrical: false }; }
    }

    const PROVIDER_LINKS = { 'Netflix': 'https://www.netflix.com/kr/', 'Disney Plus': 'https://www.disneyplus.com/ko-kr/', 'Tving': 'https://www.tving.com/', 'Coupang Play': 'https://www.coupangplay.com/' };

    function toggleTheme() { CONFIG.THEME = CONFIG.THEME === 'light' ? 'dark' : 'light'; localStorage.setItem('movielotto-theme', CONFIG.THEME); applyTheme(); }
    function applyTheme() { document.body.classList.toggle('dark-mode', CONFIG.THEME === 'dark'); document.getElementById('theme-icon').textContent = CONFIG.THEME === 'dark' ? '☀️' : '🌙'; }
    function applyLanguage() { const t = UI_TEXT[CONFIG.LANG]; document.getElementById('ui-status').textContent = t.status; document.getElementById('draw-btn').textContent = t.draw; }
    
    async function toggleLanguage() { 
      CONFIG.LANG = CONFIG.LANG === 'ko-KR' ? 'en-US' : 'ko-KR'; 
      localStorage.setItem('movielotto-lang', CONFIG.LANG); 
      applyLanguage(); 
      await fetchData(); 
      if (currentMovie) {
        const translated = allMovies.find(m => m.id === currentMovie.id) || currentMovie;
        const details = await getExtraInfo(translated);
        renderUI(translated, details);
      }
    }

    function resetApp() {
      if (isRolling) return;
      document.getElementById('slot-layer').style.display = 'flex';
      document.getElementById('res-poster').classList.add('opacity-0');
      document.getElementById('res-title').textContent = '';
      document.getElementById('res-desc').textContent = '';
      document.getElementById('badge-row-meta').innerHTML = '';
      document.getElementById('badge-row-scores').innerHTML = '<span class="sticker-badge">TMDB --</span><span class="sticker-badge">IMDb --</span><span class="sticker-badge">Rotten --</span>';
      currentMovie = null;
    }

    init();
  </script>
</body>
</html>
